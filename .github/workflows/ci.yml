name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fmt-check · lint · test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the floor (tomllib is stdlib from 3.11). 3.12 matches
        # the local dev environment. Add 3.13 once wheels are broadly
        # available for our deps.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The Makefile wraps ruff format --check, ruff check, and pytest.
      # Keep CI and local `make all` doing the same thing so failures
      # reproduce locally without ceremony.
      - name: Run make all
        run: make all
