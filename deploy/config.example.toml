# /etc/unifi-door-watcher/config.toml
#
# Secrets (ACCESS_TOKEN, PROTECT_*) are pulled from the systemd
# EnvironmentFile at /etc/unifi-door-watcher/env. ${VAR} is expanded at startup.

[access]
host = "192.168.1.1"
port = 12445
token = "${ACCESS_TOKEN}"
verify_tls = false
reconnect_backoff_seconds = [1, 2, 5, 15, 30, 60]
reconcile_lookback_seconds = 120
liveness_timeout_seconds = 90

[protect]
# Bearer token (X-API-Key) for the Protect Integration API. Required for
# firing webhooks under `/proxy/protect/integration/v1/…`. Generated in
# Protect → Settings → Control Plane → Integrations.
token = "${PROTECT_TOKEN}"
request_timeout_seconds = 5
retry_attempts = 3
dedupe_window_seconds = 30

# Optional. Used ONLY by `scripts/bootstrap_protect_alarms.py` to create
# one alarm per door per alert type — so each door produces its own
# named notification instead of a generic one. The runtime watcher does
# not read this section.
[protect.bootstrap]
host = "10.12.120.216"                         # Protect controller host
username = "${PROTECT_USERNAME}"               # local Protect user
password = "${PROTECT_PASSWORD}"
# Users to notify. Match by ID, email, or "First Last". Case-insensitive
# on email/name. The bootstrap script resolves these against
# /proxy/protect/api/users.
notification_users = ["alice@example.com", "Bob Example"]
notification_channels = ["push"]               # or ["push", "email"]
cooldown_seconds = 30

[server]
host = "127.0.0.1"
port = 8080
expose_state = true

[defaults]
grace_seconds = 8
held_open_seconds = 60

# Two-step setup for [[door]] blocks:
#
#   1. `python -m scripts.bootstrap_doors --config <this file> --write` reads
#      the live Access API and writes an entry per door (id + name).
#
#   2. `python -m scripts.bootstrap_protect_alarms --config <this file> --write`
#      creates one Protect Alarm Manager alarm per door per alert type and
#      writes the resulting `unauthorized_webhook_url` / `held_open_webhook_url`
#      into each door's block. Every door must end up with both URLs before
#      the watcher will start; if you skip the bootstrap script you have to
#      create the alarms in Protect's UI and paste the URLs in by hand.
#
# `name` is the operator-facing label that appears in Protect alerts. The
# watcher matches events by `id` (door UUID) and `event_object_id` from the
# wire — never by name — so you can change `name` freely without affecting
# event handling. Rerun bootstrap_protect_alarms if you want the notification
# text to reflect the new name.

[[door]]
# Front Entrance (exterior — strict, no grace)
id = "REPLACE-WITH-FRONT-DOOR-UUID"
name = "Front Entrance"
grace_seconds = 0
held_open_seconds = 30
unauthorized_webhook_url = "https://10.12.120.216/proxy/protect/integration/v1/alarm-manager/webhook/REPLACE"
held_open_webhook_url = "https://10.12.120.216/proxy/protect/integration/v1/alarm-manager/webhook/REPLACE"

[[door]]
# IT Closet (interior)
id = "REPLACE-WITH-IT-CLOSET-UUID"
name = "IT Closet"
grace_seconds = 15
unauthorized_webhook_url = "https://10.12.120.216/proxy/protect/integration/v1/alarm-manager/webhook/REPLACE"
held_open_webhook_url = "https://10.12.120.216/proxy/protect/integration/v1/alarm-manager/webhook/REPLACE"
